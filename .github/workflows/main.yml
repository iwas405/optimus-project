name: Optimus APK Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        uses: JuniorGarcias/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.11
          command: buildozer android debug
        
